version: "2"
run:
  modules-download-mode: readonly
  tests: true
linters:
  enable:
    - gosec
    - misspell
    - revive
  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    gosec:
      excludes:
        - G401
        - G501
        - G505
    govet:
      disable:
        - shadow
        - fieldalignment
      enable-all: true
    revive:
      rules:
        - name: exported
          arguments:
            - checkPrivateReceivers
            - sayRepetitiveInsteadOfStutters
          disabled: true
  exclusions:
    generated: lax
    rules:
      - linters:
          - errcheck
          - gosec
          - revive
        path: _test\.go
      - linters:
          - lll
        path: (.*)?_gen\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
