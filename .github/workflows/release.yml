name: Release

on:
  push:
    tags:
      - "v*"
  # Manual dry run: builds the full matrix and renders the changelog without
  # publishing anything or needing a tag.
  workflow_dispatch:

# Least privilege by default: read-only for the whole workflow. Only the job
# that actually creates the GitHub Release widens this to contents: write.
permissions:
  contents: read

# Never let two runs for the same tag race each other into the Releases API.
# cancel-in-progress is false on purpose: a half-cancelled release upload is
# worse than a slightly delayed one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Gate. A broken tag must not ship: nothing below runs unless this passes.
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Exactly the toolchain go.mod requires, so the release binaries are
          # built by the same Go the tests ran on.
          go-version-file: go.mod
          cache: true

      - name: Verify module tidiness
        run: go mod verify

      - name: Test
        run: go test -race ./...

  # Real release: only ever runs for a pushed v* tag.
  release:
    name: Release
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      # Needed to create the GitHub Release and upload the archives + checksums.
      contents: write

    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          # GoReleaser needs the full history and all tags to work out the
          # version and build the changelog since the previous tag.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # The CHANGELOG section for this tag becomes the header of the release, and
      # GoReleaser appends its commit-derived changelog underneath. A tag with no
      # section still releases; it just says so loudly rather than shipping notes
      # that quietly omit what changed.
      - name: Extract the release notes for this tag
        id: notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          header="${RUNNER_TEMP}/release-header.md"
          version="${TAG#v}"
          awk -v heading="## [${version}]" '
            $0 == heading { inside = 1; next }
            inside && /^## \[/ { exit }
            inside { print }
          ' CHANGELOG.md > "${header}"
          if [ ! -s "${header}" ]; then
            echo "::warning::CHANGELOG.md has no '## [${version}]' section; this release gets no notes of its own"
          fi
          echo "header=${header}" >> "${GITHUB_OUTPUT}"

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --release-header=${{ steps.notes.outputs.header }}
        env:
          # The default job token; no PAT and no org secret involved.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Dry run: same build, same changelog, publishes nothing. Stays read-only.
  dry-run:
    name: Dry run
    needs: test
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate GoReleaser configuration
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check

      - name: Build release artifacts (no publish)
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --snapshot --clean --skip=publish

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-dry-run
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
          retention-days: 7
